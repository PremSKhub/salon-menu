<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Aruna Salon - Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" media="screen" href="main.css">
</head>

<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden; /* Prevent scrolling */
        font-family: Arial, sans-serif;
    }

    .form-container {
        position: relative;
        height: 100vh; /* Full viewport height */
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: white;
    }

    /* Background Image with Reduced Opacity */
    .form-container::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url('images/bg.jpg') center/cover no-repeat;
        opacity: 0.4; /* Adjust opacity to make it lighter */
        z-index: -1;
    }

    .menu {
        background: rgba(0, 0, 0, 0.7); /* Semi-transparent black background */
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        width: 80%;
        max-width: 400px;
    }

    .menu h2 {
        font-size: 28px;
        margin-bottom: 15px;
        text-transform: uppercase;
        border-bottom: 2px solid white;
        padding-bottom: 10px;
    }

    .menu ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .menu ul li {
        font-size: 20px;
        padding: 10px 0;
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    }

    .menu ul li:last-child {
        border-bottom: none;
    }
</style>

<body>

    <div class="form-container">
        <div class="menu">
            <h2>Salon Services</h2>
            <ul>
                <li>Haircut <span>₹150</span></li>
                <li>Shaving <span>₹100</span></li>
                <li>Beard Trim <span>₹120</span></li>
                <li>Facial <span>₹500</span></li>
                <li>Hair Spa <span>₹800</span></li>
                <li>Hair Coloring <span>₹1200</span></li>
                <li>Head Massage <span>₹300</span></li>
                <li>Threading <span>₹80</span></li>
                <li>Waxing <span>₹400</span></li>
                <li>Manicure & Pedicure <span>₹600</span></li>
            </ul>
        </div>
    </div>

</body>
</html>
