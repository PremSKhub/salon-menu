<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Aruna Salon - Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" type="text/css" media="screen" href="main.css">
</head>

<style>
    /* Reset Styles */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* Full-Height Container */
    body, html {
        height: 100%;
        font-family: 'Arial', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        background: url('images/bg.jpg') top center / contain no-repeat; /* Ensures the full image is visible */
    }

    /* Overlay for Readability */
    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
    }

    /* Salon Menu */
    .menu {
        background: rgba(255, 255, 255, 0.9);
        color: black;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        width: 90%;
        max-width: 350px;
        position: relative;
        z-index: 2;
    }

    .menu h2 {
        font-size: 22px;
        margin-bottom: 12px;
        text-transform: uppercase;
        border-bottom: 2px solid black;
        padding-bottom: 8px;
        text-align: center;
    }

    .menu ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .menu ul li {
        font-size: 16px;
        padding: 8px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(0, 0, 0, 0.2);
    }

    .menu ul li:last-child {
        border-bottom: none;
    }

    /* Mobile Responsiveness */
    @media (max-width: 480px) {
        .menu {
            width: 95%;
            max-width: 320px;
        }
        
        .menu h2 {
            font-size: 20px;
        }

        .menu ul li {
            font-size: 14px;
        }
    }

</style>

<body>

    <div class="overlay"></div>

    <div class="menu">
        <h2>Salon Services</h2>
        <ul>
            <li>Haircut <span>₹150</span></li>
            <li>Shaving <span>₹100</span></li>
            <li>Beard Trim <span>₹120</span></li>
            <li>Facial <span>₹500</span></li>
            <li>Hair Spa <span>₹800</span></li>
            <li>Hair Coloring <span>₹1200</span></li>
            <li>Head Massage <span>₹300</span></li>
            <li>Threading <span>₹80</span></li>
            <li>Waxing <span>₹400</span></li>
            <li>Manicure & Pedicure <span>₹600</span></li>
        </ul>
    </div>

</body>
</html>
