<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Aruna Salon - Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" type="text/css" media="screen" href="main.css">
</head>

<style>
    /* Reset Styles */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* Full-Height Container */
    body, html {
        height: 100%;
        font-family: 'Arial', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Background Image with Opacity */
    .form-container {
        position: relative;
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .form-container::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url('images/bg.jpg') center/cover no-repeat;
        opacity: 0.3; /* Adjust for better readability */
        z-index: -1;
    }

    /* Salon Menu */
    .menu {
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        width: 90%;
        max-width: 350px;
    }

    .menu h2 {
        font-size: 24px;
        margin-bottom: 12px;
        text-transform: uppercase;
        border-bottom: 2px solid white;
        padding-bottom: 8px;
    }

    .menu ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .menu ul li {
        font-size: 18px;
        padding: 10px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    }

    .menu ul li:last-child {
        border-bottom: none;
    }

    /* Mobile Responsiveness */
    @media (max-width: 480px) {
        .menu {
            width: 95%;
            max-width: 320px;
        }
        
        .menu h2 {
            font-size: 22px;
        }

        .menu ul li {
            font-size: 16px;
        }
    }

</style>

<body>

    <div class="form-container">
        <div class="menu">
            <h2>Salon Services</h2>
            <ul>
                <li>Haircut <span>₹150</span></li>
                <li>Shaving <span>₹100</span></li>
                <li>Beard Trim <span>₹120</span></li>
                <li>Facial <span>₹500</span></li>
                <li>Hair Spa <span>₹800</span></li>
                <li>Hair Coloring <span>₹1200</span></li>
                <li>Head Massage <span>₹300</span></li>
                <li>Threading <span>₹80</span></li>
                <li>Waxing <span>₹400</span></li>
                <li>Manicure & Pedicure <span>₹600</span></li>
            </ul>
        </div>
    </div>

</body>
</html>
